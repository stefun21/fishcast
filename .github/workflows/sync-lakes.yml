name: Actualizare automata locatii

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 2,5"

permissions:
  contents: write

concurrency:
  group: fishcast-data-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instaleaza osmium
        run: |
          sudo apt-get update
          sudo apt-get install -y osmium-tool

      - name: Descarca extractul zilnic Romania
        run: |
          mkdir -p tmp
          curl --fail --location --retry 4 --retry-delay 10 --connect-timeout 30 --max-time 900 \
            https://download.geofabrik.de/europe/romania-latest.osm.pbf \
            --output tmp/romania.osm.pbf

      - name: Extrage locatiile de pescuit
        run: |
          osmium tags-filter tmp/romania.osm.pbf \
            nwr/leisure=fishing \
            nwr/sport=fishing \
            nwr/fishing \
            nwr/landuse=aquaculture \
            nwr/aquaculture \
            nwr/fish \
            -o tmp/fishing.osm.pbf --overwrite
          osmium export tmp/fishing.osm.pbf -f geojsonseq -o tmp/fishing.geojsonseq --overwrite
          echo "Obiecte extrase:"
          osmium fileinfo -e tmp/fishing.osm.pbf | grep -E "Number of (nodes|ways|relations)" || true
          echo "Linii GeoJSON:"
          wc -l tmp/fishing.geojsonseq

      - name: Genereaza baza JSON
        run: node scripts/build-lakes.mjs tmp/fishing.geojsonseq

      - name: Commit date actualizate
        run: |
          git config user.name "fishcast-data-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/lakes.generated.json
          if git diff --cached --quiet; then
            echo "Nu exista modificari."
          else
            git commit -m "chore(data): actualizare locatii pescuit"
            git push
          fi
