name: Sincronizare balti

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

concurrency:
  group: fishcast-sync-lakes
  cancel-in-progress: true

jobs:
  sync:
    name: Import OpenStreetMap
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Afiseaza versiunea Node
        run: node --version

      - name: Importa baltile din OpenStreetMap
        run: node scripts/sync-lakes.mjs

      - name: Valideaza fisierul generat
        run: node scripts/validate-lakes.mjs

      - name: Commit si push daca exista modificari
        shell: bash
        run: |
          if git diff --quiet -- data/lakes.generated.json; then
            echo "Nu exista modificari de salvat."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/lakes.generated.json
          git commit -m "chore(data): actualizare automata balti"
          git push
