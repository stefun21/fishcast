name: Actualizare catalog FishCast

on:
  workflow_dispatch:
  schedule:
    - cron: "37 4 * * 1"

permissions:
  contents: write

concurrency:
  group: fishcast-data-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalează osmium
        run: |
          sudo apt-get update
          sudo apt-get install -y osmium-tool

      - name: Descarcă extractul OpenStreetMap România
        run: |
          mkdir -p tmp
          curl --fail --location --retry 5 --retry-all-errors --connect-timeout 30 \
            --output tmp/romania.osm.pbf \
            https://download.geofabrik.de/europe/romania-latest.osm.pbf
          test -s tmp/romania.osm.pbf

      - name: Extrage locațiile relevante
        run: |
          osmium tags-filter tmp/romania.osm.pbf \
            nwr/leisure=fishing \
            nwr/amenity=fishing \
            nwr/sport=fishing \
            nwr/fishing=yes \
            nwr/landuse=aquaculture \
            nwr/landuse=reservoir \
            nwr/natural=water \
            nwr/water=lake \
            nwr/water=pond \
            nwr/water=reservoir \
            -o tmp/waters.osm.pbf --overwrite

          osmium export tmp/waters.osm.pbf \
            -f geojsonseq \
            -o tmp/waters.geojsonseq --overwrite

          test -s tmp/waters.geojsonseq

      - name: Generează catalogul
        run: |
          node scripts/build-lakes.mjs \
            tmp/waters.geojsonseq \
            data/lakes.generated.json \
            data/catalog-meta.json

      - name: Validează catalogul
        run: node scripts/validate-lakes.mjs data/lakes.generated.json data/catalog-meta.json

      - name: Afișează statistici
        run: |
          node -e "const m=require('./data/catalog-meta.json'); console.log(JSON.stringify(m,null,2))"

      - name: Salvează modificările
        run: |
          git config user.name "fishcast-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/lakes.generated.json data/catalog-meta.json
          git diff --cached --quiet && exit 0
          git commit -m "chore(data): actualizare catalog FishCast"
          git push
