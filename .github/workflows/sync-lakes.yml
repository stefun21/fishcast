name: Actualizare automata catalog FishCast

on:
  workflow_dispatch:
  schedule:
    - cron: "19 4 * * 1"
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/sync-lakes.yml"
      - "scripts/**"

permissions:
  contents: write

concurrency:
  group: fishcast-catalog
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instaleaza uneltele necesare
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends osmium-tool jq
          mkdir -p tmp

      - name: Descarca OpenStreetMap Romania
        run: |
          curl -4 --http1.1 --fail --location --silent --show-error \
            --retry 4 --retry-delay 4 --retry-connrefused \
            --connect-timeout 20 --max-time 900 \
            --user-agent "FishCast-Romania/3.2" \
            --output tmp/romania.osm.pbf \
            https://download.geofabrik.de/europe/romania-latest.osm.pbf
          test -s tmp/romania.osm.pbf

      - name: Extrage locurile si corpurile de apa
        run: |
          osmium tags-filter tmp/romania.osm.pbf \
            nwr/leisure=fishing \
            nwr/amenity=fishing \
            nwr/sport=fishing \
            nwr/fishing=yes \
            nwr/landuse=aquaculture \
            nwr/aquaculture \
            nwr/natural=water \
            nwr/water=lake \
            nwr/water=pond \
            nwr/water=reservoir \
            nwr/water=lagoon \
            nwr/water=oxbow \
            nwr/water=basin \
            nwr/landuse=reservoir \
            nwr/landuse=basin \
            --output tmp/waters.osm.pbf \
            --overwrite

          osmium export tmp/waters.osm.pbf \
            --format geojsonseq \
            --output tmp/waters.geojsonseq \
            --overwrite

          test -s tmp/waters.geojsonseq

      - name: Pregateste sursele optionale
        run: |
          printf '%s\n' '{"type":"FeatureCollection","features":[]}' > tmp/natural.geojson
          printf '%s\n' '{"type":"FeatureCollection","features":[]}' > tmp/reservoirs.geojson
          printf '%s\n' '{"type":"FeatureCollection","features":[]}' > tmp/surface.geojson
          printf '%s\n' '{"results":{"bindings":[]}}' > tmp/wikidata.json
          : > tmp/anpa-text.txt

          if [ -f scripts/fetch-anpa.mjs ]; then
            node scripts/fetch-anpa.mjs tmp/anpa-text.txt tmp/anpa || true
          fi

      - name: Genereaza catalogul
        run: |
          node scripts/build-catalog-v3.mjs \
            --osm tmp/waters.geojsonseq \
            --natural tmp/natural.geojson \
            --reservoirs tmp/reservoirs.geojson \
            --surface tmp/surface.geojson \
            --wikidata tmp/wikidata.json \
            --anpa tmp/anpa-text.txt \
            --output data/lakes.generated.json \
            --meta data/catalog-meta.json \
            --max 12000 \
            --min 10

      - name: Valideaza catalogul
        run: node scripts/validate-lakes.mjs data/lakes.generated.json data/catalog-meta.json

      - name: Afiseaza statisticile
        run: |
          node -e "const m=require('./data/catalog-meta.json'); console.log(JSON.stringify(m, null, 2));"

      - name: Salveaza modificarile
        run: |
          git config user.name "fishcast-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/lakes.generated.json data/catalog-meta.json

          if git diff --cached --quiet; then
            echo "Catalogul nu s-a schimbat."
            exit 0
          fi

          git commit -m "chore(data): actualizare catalog FishCast"
          git push
