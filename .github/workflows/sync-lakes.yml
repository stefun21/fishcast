name: Actualizare catalog FishCast

on:
  workflow_dispatch:
  schedule:
    - cron: "37 4 * * 1"

permissions:
  contents: write

concurrency:
  group: fishcast-data-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalează osmium
        run: sudo apt-get update && sudo apt-get install -y osmium-tool

      - name: Descarcă extractul România
        run: |
          mkdir -p tmp
          curl --fail --location --retry 4 --retry-delay 10 \
            --output tmp/romania.osm.pbf \
            https://download.geofabrik.de/europe/romania-latest.osm.pbf

      - name: Extrage candidații
        run: |
          osmium tags-filter tmp/romania.osm.pbf \
            nwr/leisure=fishing \
            nwr/amenity=fishing \
            nwr/sport=fishing \
            nwr/fishing=yes \
            nwr/landuse=aquaculture \
            nwr/water=pond \
            nwr/water=reservoir \
            -o tmp/fishing.osm.pbf --overwrite
          osmium export tmp/fishing.osm.pbf \
            --geometry-types=point,linestring,polygon \
            -f geojsonseq -o tmp/fishing.geojsonseq --overwrite

      - name: Generează și clasifică catalogul
        run: node scripts/build-lakes.mjs tmp/fishing.geojsonseq data/lakes.generated.json data/catalog-meta.json

      - name: Validează catalogul
        run: node scripts/validate-lakes.mjs data/lakes.generated.json data/catalog-meta.json

      - name: Salvează modificările
        run: |
          git config user.name "fishcast-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/lakes.generated.json data/catalog-meta.json
          git diff --cached --quiet && exit 0
          git commit -m "chore(data): clasificare și deduplicare catalog"
          git push
